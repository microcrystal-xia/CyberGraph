version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: cybergraph-neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=neo4j/cybergraph123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - ./neo4j:/var/lib/neo4j/import/cybergraph
    healthcheck:
      test: wget -qO- http://localhost:7474 || exit 1
      interval: 5s
      timeout: 3s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: cybergraph-n8n
    ports:
      - '5678:5678'
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  n8n_data:
